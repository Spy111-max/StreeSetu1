<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreeSetu | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shape shape-a"></div>
    <div class="shape shape-b"></div>

    <main class="reset-layout">
      <section class="auth-brand">
        <p class="pill">StreeSetu</p>
        <h1>Reset your password securely.</h1>
        <p>
          Request a reset token, verify it, and set a new password.
          Your new password is saved directly in the real database.
        </p>
        <a class="inline-link" href="/">Back to Login</a>
      </section>

      <section class="auth-card reset-card">
        <form id="forgotForm" class="tool-form reset-form">
          <h3>Step 1: Get Reset Token</h3>
          <label>Email
            <input name="email" type="email" required />
          </label>
          <button type="submit" class="btn-ghost">Generate Token</button>
          <p id="forgotMsg" class="msg"></p>
        </form>

        <form id="resetForm" class="tool-form reset-form">
          <h3>Step 2: Verify and Reset Password</h3>
          <label>Email
            <input name="email" type="email" required />
          </label>
          <label>Reset token
            <input name="token" type="text" required />
          </label>
          <label>New password
            <input name="newPassword" type="password" minlength="8" required />
          </label>
          <label>Confirm new password
            <input name="confirmPassword" type="password" minlength="8" required />
          </label>
          <button type="submit" class="btn-primary">Reset Password</button>
          <p id="resetMsg" class="msg"></p>
        </form>
      </section>
    </main>

    <script src="reset-password.js"></script>
  </body>
</html>
